<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>غير متصل - استقامة</title>
    <meta name="theme-color" content="#6baa5e" />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family:
          system-ui,
          -apple-system,
          "Segoe UI",
          Roboto,
          "Noto Naskh Arabic",
          sans-serif;
        background: linear-gradient(135deg, #f4f7f4 0%, #e8f0e5 100%);
        min-height: 100dvh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 1.5rem;
        color: #2c3e2d;
      }

      .container {
        background: #ffffff;
        border-radius: 2rem;
        box-shadow:
          0 20px 40px rgba(0, 0, 0, 0.08),
          0 8px 20px rgba(0, 0, 0, 0.03);
        padding: 3rem 2rem 2.5rem;
        max-width: 450px;
        width: 100%;
        text-align: center;
        animation: fadeUp 0.6s ease-out;
      }

      @keyframes fadeUp {
        from {
          opacity: 0;
          transform: translateY(30px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .icon {
        margin-bottom: 1.5rem;
      }

      .icon svg {
        width: 96px;
        height: 96px;
        fill: none;
        stroke: #6baa5e;
        stroke-width: 1.8;
        stroke-linecap: round;
        stroke-linejoin: round;
        filter: drop-shadow(0 8px 12px rgba(107, 170, 94, 0.25));
      }

      h1 {
        font-size: 1.8rem;
        font-weight: 700;
        margin-bottom: 0.75rem;
        color: #1e3b20;
      }

      p {
        font-size: 1.05rem;
        line-height: 1.8;
        color: #4a5b48;
        margin-bottom: 2rem;
      }

      .retry-btn {
        background: #6baa5e;
        border: none;
        padding: 0.85rem 2.5rem;
        font-size: 1.1rem;
        font-weight: 600;
        font-family: inherit;
        color: white;
        border-radius: 3rem;
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        transition:
          background 0.2s,
          transform 0.1s;
        box-shadow: 0 8px 18px rgba(107, 170, 94, 0.3);
        text-decoration: none;
      }

      .retry-btn:hover {
        background: #5c994f;
        transform: translateY(-2px);
        box-shadow: 0 12px 22px rgba(107, 170, 94, 0.35);
      }

      .retry-btn:active {
        transform: translateY(0);
        box-shadow: 0 5px 12px rgba(107, 170, 94, 0.25);
      }

      .retry-btn svg {
        width: 22px;
        height: 22px;
        fill: none;
        stroke: white;
        stroke-width: 2.2;
        stroke-linecap: round;
        stroke-linejoin: round;
      }

      .footer-note {
        margin-top: 2rem;
        font-size: 0.85rem;
        color: #7e8c7b;
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 0.3rem;
      }

      .footer-note svg {
        width: 16px;
        height: 16px;
        fill: #7e8c7b;
      }

      a,
      button,
      [role="button"],
      .clickable {
        -webkit-tap-highlight-color: transparent;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <!-- Offline Icon (cloud with slash) -->
      <div class="icon">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
          <path d="M18 18L6 6" />
          <path d="M8 8.5C5.5 8.8 3.5 10.8 3.5 13.5C3.5 15 4.3 16.3 5.5 17" />
          <path
            d="M18.5 18C19.8 17.3 20.5 16 20.5 14.5C20.5 12.2 18.8 10.3 16.5 10"
          />
          <path d="M16.5 10C16.5 7.5 14.5 5.5 12 5.5C10.8 5.5 9.7 6 9 6.8" />
        </svg>
      </div>

      <h1>لا يوجد اتصال بالإنترنت</h1>
      <p>
        يبدو أنك غير متصل حاليًا.<br />
        يمكنك متابعة تصفح الصفحات التي تم تحميلها مسبقًا، أو المحاولة لاحقًا.
      </p>

      <!-- Retry Button (reloads current page) -->
      <button class="retry-btn" onclick="window.location.reload()">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
          <polyline points="1 4 1 10 7 10" />
          <path d="M21 20v-6h-6" />
          <path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10" />
          <path d="M3.51 15A9 9 0 0 0 18.36 18.36L23 14" />
        </svg>
        إعادة المحاولة
      </button>

      <div class="footer-note">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
          <path
            d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.94-.49-7-3.85-7-7.93s3.06-7.44 7-7.93v15.86zm2-15.86c1.03.13 2.01.44 2.89.89L13 7v7l3.2 3.2c.95-1.15 1.55-2.64 1.73-4.27H15V9h3.2c-.15-1.02-.53-1.96-1.06-2.77L14 9.4V6.85c.46-.33.97-.61 1.5-.82C14.64 5.68 13.86 5.36 13 5.07z"
          />
        </svg>
        استقامة - معك في كل حين
      </div>
    </div>
  </body>
</html>
